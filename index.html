<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Agent | 仪表板</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
  <div class="sidebar-brand">HERMES</div>
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-item active"><span class="icon">📊</span>仪表板</a>
    <a href="daily/index.html" class="nav-item"><span class="icon">📰</span>日报</a>
    <a href="skills.html" class="nav-item"><span class="icon">🛠️</span>技能</a>
    <a href="tools.html" class="nav-item"><span class="icon">🔧</span>工具</a>
    <a href="personal/about.html" class="nav-item"><span class="icon">👤</span>关于</a>
  </nav>
</aside>

        <main class="main-content">
            <section class="hero">
                <h1 class="gradient-text">Hermes Agent</h1>
                <p class="subtitle">您的下一代 AI 自动化智能体</p>
                <div class="status-badge">🟢 Online</div>
            </section>

            <section id="service-stack">
                <h2 class="category-header">服务状态</h2>
                <div id="status-list">
                    <!-- Loaded via JS -->
                    <p>正在加载状态...</p>
                </div>
            </section>

            <section id="daily-brief">
                <h2 class="category-header">今日简报</h2>
                <div class="card" style="cursor: default;">
                    <p class="card-summary">查看最新的自动化报告与任务进度。</p>
                    <a href="daily/index.html" class="related-link" style="display: inline-block; margin-top: 1rem;">查看详情 →</a>
                </div>
            </section>

            <section id="skills-preview">
                <h2 class="category-header">核心技能预览</h2>
                <div id="skills-grid" class="grid">
                    <!-- Loaded via JS -->
                </div>
            </section>

            <section id="tools-preview">
                <h2 class="category-header">工具墙预览</h2>
                <div id="tools-grid" class="grid">
                    <!-- Loaded via JS -->
                </div>
            </section>

            <footer>
                &copy; 2026 Hermes Agent. Built by Zhang Junxiang.
            </footer>
        </main>
    </div>

    <script>
        async function loadStatus() {
            const list = document.getElementById('status-list');
            try {
                const response = await fetch('status.json');
                const data = await response.json();
                list.innerHTML = '';
                
                const services = data.services || [];
                services.forEach(item => {
                    const status = item.status;
                    const isOnline = ['active', 'PONG', '200', 'connected'].includes(status.toString().toLowerCase());
                    const dotClass = isOnline ? 'green' : 'red';
                    const text = isOnline ? '运行中' : '离线';
                    
                    const el = document.createElement('div');
                    el.className = 'status-item';
                    el.innerHTML = `
                        <span style="font-size: 1.1rem; margin-right: 0.5rem;">${item.icon || ''}</span>
                        <div class="status-dot ${dotClass}"></div>
                        <span style="flex: 1;">${item.name} <span style="font-size: 0.7rem; opacity: 0.5;">(${item.type})</span></span>
                        <span style="color: ${isOnline ? 'var(--success)' : 'var(--error)'}; font-size: 0.875rem;">${text}</span>
                    `;
                    list.appendChild(el);
                });
            } catch (e) {
                list.innerHTML = '<p>无法加载服务状态。</p>';
            }
        }

        async function loadPreview(type, elementId, limit = 6) {
            const container = document.getElementById(elementId);
            try {
                const response = await fetch(`data/${type}.json`);
                const data = await response.json();
                container.innerHTML = '';

                // For skills, we'll group by category and take first few from first few categories
                // For simplicity in preview, let's just take first N items
                const items = data.slice(0, limit);

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-icon">${item.icon}</span>
                            <span class="card-title">${item.name_cn}</span>
                        </div>
                        <div class="card-subtitle">${item.name_en}</div>
                        <div class="card-summary">${item.summary}</div>
                        <div class="badge">${item.category}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = `<p>无法加载 ${type} 预览。</p>`;
            }
        }

        window.onload = () => {
            loadStatus();
            loadPreview('skills', 'skills-grid', 6);
            loadPreview('tools', 'tools-grid', 6);
        };
    </script>
</body>
</html>
