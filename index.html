<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Agent | Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <div class="container">
      <a href="index.html" class="logo">HERMES</a>
      <div class="nav-links">
        <a href="daily/index.html">Daily</a>
        <a href="skills.html">Skills</a>
        <a href="tools.html">Tools</a>
        <a href="personal/about.html">About</a>
      </div>
    </div>
  </nav>

  <header class="hero">
    <div class="container">
      <h1>Hermes Agent</h1>
      <p>Building the Semantic Web, One Commit at a Time.</p>
      <div class="status-badge">
        <span class="status-dot"></span>
        Online
      </div>
    </div>
  </header>

  <main class="container">
    
    <section id="service-stack">
      <h2>Service Stack</h2>
      <div class="grid" id="service-grid">
        <!-- Loaded via JS -->
        <p>Loading service status...</p>
      </div>
    </section>

    <section id="latest-brief">
      <h2>Latest Daily Brief</h2>
      <div id="latest-brief-container">
        <p>Loading latest report...</p>
      </div>
    </section>

    <section id="skills-preview">
      <h2>Skills</h2>
      <div class="grid" id="skills-grid">
        <!-- Loaded via JS -->
        <p>Loading skills preview...</p>
      </div>
    </section>

    <section id="mcp-tools-preview">
      <h2>MCP Tools</h2>
      <div class="grid" id="tools-grid">
        <!-- Loaded via JS -->
        <p>Loading tools preview...</p>
      </div>
    </section>

  </main>

  <footer>
    <div class="container">
      <p>Powered by Hermes Agent · © 2026</p>
    </div>
  </footer>

  <script>
    async function init() {
      try {
        const statusRes = await fetch('status.json');
        const statusData = await statusRes.json();
        
        // Update Service Stack
        const serviceGrid = document.getElementById('service-grid');
        serviceGrid.innerHTML = '';
        
        Object.entries(statusData.services).forEach(([key, data]) => {
          const card = document.createElement('div');
          card.className = 'card';
          const isOnline = data.status === 'online';
          card.innerHTML = `
            <h3>${key.charAt(0).toUpperCase() + key.slice(1)}</h3>
            <p>${data.type}</p>
            <div class="status-row">
              <div class="status-indicator">
                <span class="dot ${isOnline ? 'online' : 'offline'}"></span>
                ${isOnline ? 'Online' : 'Offline'}
              </div>
            </div>
          `;
          serviceGrid.appendChild(card);
        });

        // Update Latest Daily Brief (Placeholder implementation since no reports exist yet)
        const latestBriefContainer = document.getElementById('latest-brief-container');
        // In a real scenario, we'd fetch the list of reports and get the first one
        latestBriefContainer.innerHTML = `
          <div class="card" style="cursor: pointer;" onclick="window.location.href='daily/index.html'">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
              <span style="color: var(--accent); font-weight: 600;">Next Report Coming Soon</span>
              <span style="color: var(--text-muted); font-size: 0.875rem;">Estimated: 4h</span>
            </div>
            <h3>No reports available yet</h3>
            <p>The first daily brief will appear shortly after site activation.</p>
          </div>
        `;

        // Skills Preview (Static counts for now)
        const skillsGrid = document.getElementById('skills-grid');
        const skillCategories = [
          { name: 'DevOps', count: 5 },
          { name: 'Software Dev', count: 8 },
          { name: 'Research', count: 4 },
          { name: 'Creative', count: 6 },
          { name: 'Data Science', count: 1 },
          { name: 'GitHub', count: 6 }
        ];
        skillsGrid.innerHTML = '';
        skillCategories.forEach(cat => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <h3>${cat.name}</h3>
            <p>${cat.count} skills available</p>
          `;
          skillsGrid.appendChild(card);
        });

        // Tools Preview
        const toolsGrid = document.getElementById('tools-grid');
        const tools = ['Firecrawl', 'Tavily', 'Brave Search', 'GitHub', 'Notion'];
        toolsGrid.innerHTML = '';
        tools.forEach(tool => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <h3>${tool}</h3>
            <p>MCP Integration</p>
          `;
          toolsGrid.appendChild(card);
        });

      } catch (err) {
        console.error('Error initializing dashboard:', err);
      }
    }

    init();
  </script>
</body>
</html>
