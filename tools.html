<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Agent | 工具墙</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
  <div class="sidebar-brand">HERMES</div>
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-item"><span class="icon">📊</span>仪表板</a>
    <a href="daily/index.html" class="nav-item"><span class="icon">📰</span>日报</a>
    <a href="skills.html" class="nav-item"><span class="icon">🛠️</span>技能</a>
    <a href="tools.html" class="nav-item active"><span class="icon">🔧</span>工具</a>
    <a href="personal/about.html" class="nav-item"><span class="icon">👤</span>关于</a>
  </nav>
</aside>

        <main class="main-content">
            <h1 class="gradient-text">工具墙</h1>
            <p class="subtitle">已集成的 MCP 工具与服务</p>

            <div class="controls">
                <div id="filter-tabs" class="filter-tabs">
                    <div class="filter-tab active" data-category="all">全部</div>
                </div>
            </div>

            <div id="tools-container">
                <!-- Tools will be loaded here -->
            </div>

            <footer>
                &copy; 2026 Hermes Agent. Built by Zhang Junxiang.
            </footer>
        </main>
    </div>

    <!-- ============ Detail Modal ============ -->
    <div id="detail-modal" class="modal-overlay">
        <div class="modal-wrapper">
            <button class="modal-close-btn" onclick="closeDetailModal()">✕</button>
            <div class="modal-layout">
                <nav class="modal-nav" id="modal-nav"></nav>
                <div class="modal-body" id="modal-body">
                    <div id="modal-title-area">
                        <h2 id="modal-title"></h2>
                        <p class="modal-subtitle" id="modal-subtitle"></p>
                    </div>
                    <div id="modal-content" class="modal-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allTools = [];
        let currentCategory = 'all';

        async function loadTools() {
            try {
                const response = await fetch('data/tools.json');
                allTools = await response.json();

                let statuses = {};
                try {
                    const statusRes = await fetch('status.json');
                    statuses = await statusRes.json();
                } catch (e) {
                    console.error("Failed to load status.json", e);
                }

                // Generate category tabs
                const categories = ['all', ...new Set(allTools.map(t => t.category))];
                const filterTabs = document.getElementById('filter-tabs');
                filterTabs.innerHTML = '';
                categories.forEach(cat => {
                    const tab = document.createElement('div');
                    tab.className = `filter-tab ${cat === 'all' ? 'active' : ''}`;
                    tab.textContent = cat === 'all' ? '全部' : cat;
                    tab.onclick = () => {
                        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        currentCategory = cat;
                        renderTools(statuses);
                    };
                    filterTabs.appendChild(tab);
                });

                renderTools(statuses);
            } catch (e) {
                console.error(e);
                document.getElementById('tools-container').innerHTML = '<p>无法加载工具数据。</p>';
            }
        }

        function renderTools(statuses) {
            const container = document.getElementById('tools-container');
            container.innerHTML = '';

            const filtered = allTools.filter(tool => {
                return currentCategory === 'all' || tool.category === currentCategory;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p>未找到匹配的工具。</p>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'grid';

            filtered.forEach(tool => {
                const statusVal = statuses[tool.id] || tool.status || 'pending';
                const isConnected = ['connected', 'active', 'PONG', '200'].includes(statusVal.toString().toLowerCase());
                const dotClass = isConnected ? 'green' : (statusVal === 'pending' ? 'gray' : 'red');
                const statusText = isConnected ? '已连接' : (statusVal === 'pending' ? '未就绪' : '离线');

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-icon">${tool.icon || '🔌'}</span>
                        <div style="display: flex; flex-direction: column;">
                            <span class="card-title">${tool.name_cn || tool.name_en || tool.id}</span>
                            <span style="font-size: 0.75rem; opacity: 0.7;">${tool.name_en || ''}</span>
                        </div>
                        <div style="margin-left: auto; display: flex; align-items: center; gap: 0.4rem;">
                            <div class="status-dot ${dotClass}"></div>
                            <span style="font-size: 0.7rem; opacity: 0.8;">${statusText}</span>
                        </div>
                    </div>
                    <div class="card-subtitle">${tool.category || ''}</div>
                    <div class="card-summary">${tool.summary || tool.summary || ''}</div>
                    <button class="detail-btn" onclick="event.stopPropagation(); openDetailModal('${tool.id.replace(/'/g, "\\'")}')">
                        📖 查看详情
                    </button>
                `;
                grid.appendChild(card);
            });

            container.appendChild(grid);
        }

        function openDetailModal(toolId) {
            const tool = allTools.find(t => t.id === toolId);
            if (!tool) return;

            const overlay = document.getElementById('detail-modal');
            document.getElementById('modal-title').textContent = tool.name_cn || tool.name_en || tool.id;
            document.getElementById('modal-subtitle').textContent = tool.name_en || tool.id;

            // Render detail as Markdown
            const contentDiv = document.getElementById('modal-content');
            contentDiv.innerHTML = tool.detail ? marked.parse(tool.detail) : '<p>暂无详细说明。</p>';

            // Generate TOC from headings
            const nav = document.getElementById('modal-nav');
            nav.innerHTML = '';
            const headings = contentDiv.querySelectorAll('h2, h3, h4');
            headings.forEach((h, i) => {
                const id = 'section-' + i;
                h.id = id;
                const a = document.createElement('a');
                a.className = h.tagName === 'H2' ? 'h2' : 'h3';
                a.textContent = h.textContent;
                a.href = '#' + id;
                a.onclick = (e) => {
                    e.preventDefault();
                    document.getElementById('modal-body').scrollTo({
                        top: h.offsetTop - 80,
                        behavior: 'smooth'
                    });
                };
                nav.appendChild(a);
            });

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetailModal() {
            const overlay = document.getElementById('detail-modal');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close on overlay click (outside wrapper)
        document.getElementById('detail-modal').onclick = (e) => {
            if (e.target === e.currentTarget) {
                closeDetailModal();
            }
        };

        // Close on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('detail-modal').classList.contains('active')) {
                closeDetailModal();
            }
        });

        loadTools();
    </script>
</body>
</html>
