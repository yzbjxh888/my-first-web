<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Agent | 技能目录</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
  <div class="sidebar-brand">HERMES</div>
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-item"><span class="icon">📊</span>仪表板</a>
    <a href="daily/index.html" class="nav-item"><span class="icon">📰</span>日报</a>
    <a href="skills.html" class="nav-item active"><span class="icon">🛠️</span>技能</a>
    <a href="tools.html" class="nav-item"><span class="icon">🔧</span>工具</a>
    <a href="personal/about.html" class="nav-item"><span class="icon">👤</span>关于</a>
  </nav>
</aside>

        <main class="main-content">
            <h1 class="gradient-text">技能目录</h1>
            <p class="subtitle">Hermes Agent 的核心能力集</p>

            <div class="controls">
                <input type="text" id="search-bar" class="search-bar" placeholder="搜索技能名称或描述...">
                <div id="filter-tabs" class="filter-tabs">
                    <div class="filter-tab active" data-category="all">全部</div>
                </div>
            </div>

            <div id="skills-container">
                <!-- Skills are loaded here -->
            </div>

            <footer>
                &copy; 2026 Hermes Agent. Built by Zhang Junxiang.
            </footer>
        </main>
    </div>

    <!-- ============ Detail Modal ============ -->
    <div id="detail-modal" class="modal-overlay">
        <div class="modal-wrapper">
            <button class="modal-close-btn" onclick="closeDetailModal()">✕</button>
            <div class="modal-layout">
                <nav class="modal-nav" id="modal-nav"></nav>
                <div class="modal-body" id="modal-body">
                    <div id="modal-title-area">
                        <h2 id="modal-title"></h2>
                        <p class="modal-subtitle" id="modal-subtitle"></p>
                    </div>
                    <div id="modal-content" class="modal-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allSkills = [];
        let currentCategory = 'all';
        let searchQuery = '';

        async function loadSkills() {
            try {
                const response = await fetch('data/skills.json');
                allSkills = await response.json();

                const categories = ['all', ...new Set(allSkills.map(s => s.category))];
                const filterTabs = document.getElementById('filter-tabs');
                filterTabs.innerHTML = '';
                categories.forEach(cat => {
                    const tab = document.createElement('div');
                    tab.className = `filter-tab ${cat === 'all' ? 'active' : ''}`;
                    tab.textContent = cat === 'all' ? '全部' : cat;
                    tab.onclick = () => {
                        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        currentCategory = cat;
                        renderSkills();
                    };
                    filterTabs.appendChild(tab);
                });

                renderSkills();
            } catch (e) {
                console.error(e);
                document.getElementById('skills-container').innerHTML = '<p>无法加载技能数据。</p>';
            }
        }

        function renderSkills() {
            const container = document.getElementById('skills-container');
            container.innerHTML = '';

            const filtered = allSkills.filter(skill => {
                const matchesCategory = currentCategory === 'all' || skill.category === currentCategory;
                const matchName = (skill.name_cn || skill.id).toLowerCase().includes(searchQuery.toLowerCase());
                const matchSummary = (skill.summary || '').toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && (searchQuery === '' || matchName || matchSummary);
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p>未找到匹配的技能。</p>';
                return;
            }

            const grouped = filtered.reduce((acc, skill) => {
                const cat = skill.category || '其他';
                if (!acc[cat]) acc[cat] = [];
                acc[cat].push(skill);
                return acc;
            }, {});

            Object.entries(grouped).forEach(([category, skills]) => {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<h2 class="category-header">${category}</h2>`;

                const grid = document.createElement('div');
                grid.className = 'grid';

                skills.forEach(skill => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const safeId = skill.id.replace(/'/g, "\\'");
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-icon">${skill.icon || '⚙️'}</span>
                            <span class="card-title">${skill.name_cn || skill.name_en || skill.id}</span>
                        </div>
                        <div class="card-subtitle">${skill.name_en || skill.id}</div>
                        <div class="card-summary">${skill.summary || ''}</div>
                        <button class="detail-btn" onclick="event.stopPropagation(); openSkillModal('${safeId}')">
                            📖 查看详情
                        </button>
                    `;
                    grid.appendChild(card);
                });

                container.appendChild(section);
            });
        }

        function openSkillModal(skillId) {
            const skill = allSkills.find(s => s.id === skillId);
            if (!skill) return;

            const overlay = document.getElementById('detail-modal');
            document.getElementById('modal-title').textContent = skill.name_cn || skill.name_en || skill.id;
            document.getElementById('modal-subtitle').textContent = skill.name_en || skill.id;

            // Render detail as Markdown (single parse, matching tools.html)
            const contentDiv = document.getElementById('modal-content');
            contentDiv.innerHTML = skill.detail ? marked.parse(skill.detail) : '<p>暂无详细说明。</p>';

            // Append related skills as plain HTML, not markdown
            if (skill.related && skill.related.length > 0) {
                const relatedItems = skill.related
                    .filter(id => id !== skill.id)
                    .map(id => {
                        const rel = allSkills.find(s => s.id === id);
                        return rel ? `<li><a href="#" onclick="event.preventDefault(); closeDetailModal(); setTimeout(() => openSkillModal('${rel.id}'), 100)">${rel.name_cn || rel.id}</a></li>` : '';
                    })
                    .filter(Boolean)
                    .join('');
                if (relatedItems) {
                    const relatedSection = document.createElement('div');
                    relatedSection.className = 'related-section';
                    relatedSection.innerHTML = `<h3 style="margin-top:1.5rem; padding-top:1rem; border-top:1px solid #334155;">🔗 相关技能</h3><ul style="padding-left:1.2rem;">${relatedItems}</ul>`;
                    contentDiv.appendChild(relatedSection);
                }
            }

            // Generate TOC from headings
            const nav = document.getElementById('modal-nav');
            nav.innerHTML = '';
            const headings = contentDiv.querySelectorAll('h2, h3, h4');
            headings.forEach((h, i) => {
                const id = 'section-' + i;
                h.id = id;
                const a = document.createElement('a');
                a.className = h.tagName === 'H2' ? 'h2' : 'h3';
                a.textContent = h.textContent;
                a.href = '#' + id;
                a.onclick = (e) => {
                    e.preventDefault();
                    document.getElementById('modal-body').scrollTo({
                        top: h.offsetTop - 80,
                        behavior: 'smooth'
                    });
                };
                nav.appendChild(a);
            });

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetailModal() {
            const overlay = document.getElementById('detail-modal');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('detail-modal').onclick = (e) => {
            if (e.target === e.currentTarget) {
                closeDetailModal();
            }
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('detail-modal').classList.contains('active')) {
                closeDetailModal();
            }
        });

        document.getElementById('search-bar').oninput = (e) => {
            searchQuery = e.target.value;
            renderSkills();
        };

        loadSkills();
    </script>
</body>
</html>
