<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Agent | 技能目录</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
  <div class="sidebar-brand">HERMES</div>
  <nav class="sidebar-nav">
    <a href="index.html" class="nav-item"><span class="icon">📊</span>仪表板</a>
    <a href="daily/index.html" class="nav-item"><span class="icon">📰</span>日报</a>
    <a href="skills.html" class="nav-item active"><span class="icon">🛠️</span>技能</a>
    <a href="tools.html" class="nav-item"><span class="icon">🔧</span>工具</a>
    <a href="personal/about.html" class="nav-item"><span class="icon">👤</span>关于</a>
  </nav>
</aside>

        <main class="main-content">
            <h1 class="gradient-text">技能目录</h1>
            <p class="subtitle">Hermes Agent 的核心能力集</p>

            <div class="controls">
                <input type="text" id="search-bar" class="search-bar" placeholder="搜索技能名称或描述...">
                <div id="filter-tabs" class="filter-tabs">
                    <div class="filter-tab active" data-category="all">全部</div>
                    <!-- Categories will be loaded here -->
                </div>
            </div>

            <div id="skills-container">
                <!-- Skills will be loaded here -->
            </div>

            <footer>
                &copy; 2026 Hermes Agent. Built by Zhang Junxiang.
            </footer>
        </main>
    </div>

    <script>
        let allSkills = [];
        let currentCategory = 'all';
        let searchQuery = '';

        async function loadSkills() {
            try {
                const response = await fetch('data/skills.json');
                allSkills = await response.json();
                
                // Generate category tabs
                const categories = ['all', ...new Set(allSkills.map(s => s.category))];
                const filterTabs = document.getElementById('filter-tabs');
                filterTabs.innerHTML = '';
                categories.forEach(cat => {
                    const tab = document.createElement('div');
                    tab.className = `filter-tab ${cat === 'all' ? 'active' : ''}`;
                    tab.textContent = cat === 'all' ? '全部' : cat;
                    tab.onclick = () => {
                        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        currentCategory = cat;
                        renderSkills();
                    };
                    filterTabs.appendChild(tab);
                });

                renderSkills();
            } catch (e) {
                console.error(e);
                document.getElementById('skills-container').innerHTML = '<p>无法加载技能数据。</p>';
            }
        }

        function renderSkills() {
            const container = document.getElementById('skills-container');
            container.innerHTML = '';

            const filtered = allSkills.filter(skill => {
                const matchesCategory = currentCategory === 'all' || skill.category === currentCategory;
                const matchesSearch = skill.name_cn.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                    skill.summary.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p>未找到匹配的技能。</p>';
                return;
            }

            // Group by category for rendering
            const grouped = filtered.reduce((acc, skill) => {
                if (!acc[skill.category]) acc[skill.category] = [];
                acc[skill.category].push(skill);
                return acc;
            }, {});

            Object.entries(grouped).forEach(([category, skills]) => {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<h2 class="category-header">${category}</h2>`;
                
                const grid = document.createElement('div');
                grid.className = 'grid';

                skills.forEach(skill => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-icon">${skill.icon}</span>
                            <span class="card-title">${skill.name_cn} <span style="font-size:0.8rem; font-weight:normal; opacity:0.7">(${skill.name_en})</span></span>
                        </div>
                        <div class="card-subtitle">${skill.category}</div>
                        <div class="card-summary">${skill.summary}</div>
                        <div class="badge">${skill.category}</div>
                        <div class="card-detail">
                            <div class="detail-content">
                                <div class="detail-markdown">${marked.parse(skill.detail)}</div>
                                ${skill.related.length > 0 ? `
                                    <div class="related-skills">
                                        <span style="font-size:0.8rem; opacity:0.6">相关技能:</span>
                                        ${skill.related.map(id => {
                                            const rel = allSkills.find(s => s.id === id);
                                            return rel ? `<a href="#" class="related-link" onclick="event.preventDefault(); scrollToSkill('${id}')">${rel.name_cn}</a>` : '';
                                        }).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                    card.onclick = (e) => {
                        // Prevent toggle if clicking a related link
                        if (e.target.classList.contains('related-link')) return;
                        
                        const isExpanded = card.classList.contains('expanded');
                        // Collapse all others
                        document.querySelectorAll('.card.expanded').forEach(c => c.classList.remove('expanded'));
                        
                        if (!isExpanded) {
                            card.classList.add('expanded');
                        }
                    };
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function scrollToSkill(id) {
            // Find the skill card in the DOM and click it
            const cards = document.querySelectorAll('.card');
            for (const card of cards) {
                if (card.querySelector('.card-title').textContent.includes(id) || 
                    card.querySelector('.card-title').textContent.includes(allSkills.find(s => s.id === id)?.name_cn)) {
                    card.click();
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    break;
                }
            }
        }

        document.getElementById('search-bar').oninput = (e) => {
            searchQuery = e.target.value;
            renderSkills();
        };

        loadSkills();
    </script>
</body>
</html>
